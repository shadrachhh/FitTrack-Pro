<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ft-bg: #f4efe7;
            --ft-surface: #fffdf8;
            --ft-ink: #182126;
            --ft-muted: #667680;
            --ft-accent: #db6d38;
            --ft-accent-dark: #b34f20;
            --ft-dark: #14232c;
            --ft-line: rgba(20, 35, 44, 0.1);
        }

        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(219, 109, 56, 0.18), transparent 30%),
                linear-gradient(180deg, #f8f3ea 0%, #f1ece3 100%);
            color: var(--ft-ink);
        }

        .auth-shell,
        .app-shell {
            background: transparent;
        }

        .auth-panel,
        .surface-card,
        .hero-card,
        .exercise-card,
        .entry-editor {
            background: var(--ft-surface);
            border: 1px solid var(--ft-line);
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(20, 35, 44, 0.08);
        }

        .auth-showcase {
            background: linear-gradient(160deg, var(--ft-dark) 0%, #213844 55%, #274957 100%);
        }

        .hero-card,
        .surface-card,
        .exercise-card,
        .entry-editor {
            padding: 1.5rem;
        }

        .metric-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 248, 242, 0.94));
            border: 1px solid rgba(219, 109, 56, 0.15);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 18px 40px rgba(20, 35, 44, 0.08);
        }

        .metric-label,
        .eyebrow {
            letter-spacing: 0.08em;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .metric-label,
        .summary-row span {
            color: var(--ft-muted);
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .form-control,
        .form-select {
            border-radius: 0.9rem;
            border-color: rgba(20, 35, 44, 0.14);
            padding: 0.85rem 1rem;
        }

        .btn-dark {
            background: var(--ft-dark);
            border-color: var(--ft-dark);
        }

        .btn-dark:hover,
        .btn-dark:focus {
            background: #0f1a20;
            border-color: #0f1a20;
        }

        .btn-outline-dark {
            border-color: var(--ft-dark);
            color: var(--ft-dark);
        }

        .badge.text-bg-dark,
        .volume-chip,
        .muscle-tag {
            background: rgba(20, 35, 44, 0.94) !important;
            color: #fff;
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
        }

        .workout-card,
        .entry-row,
        .summary-row {
            border-bottom: 1px solid var(--ft-line);
            padding-bottom: 0.9rem;
            margin-bottom: 0.9rem;
        }

        .summary-row:last-child,
        .workout-card:last-child,
        .entry-row:last-child {
            border-bottom: 0;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .navbar-dark .navbar-nav .nav-link.router-link-active {
            color: #fff;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--ft-muted);
        }

        @media (max-width: 767px) {
            .hero-card,
            .surface-card,
            .exercise-card,
            .entry-editor {
                padding: 1.2rem;
            }

            .metric-value {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body class="bg-light">
    <div id="app"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="/spa/app.js"></script>
</body>
</html>
